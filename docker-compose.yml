# Nimbus — one-command run.
#
#   1. cp .env.example .env      # fill in NIMBUS_ENC_KEY + your LLM provider (+ integrations)
#   2. docker compose up --build
#   3. open http://localhost:8788
#
# The container serves the app AND the API on one port. Your data (SQLite DB + encrypted
# connections) persists in the named volume `nimbus-data` across restarts.

services:
  nimbus:
    build: .
    image: nimbus:latest
    container_name: nimbus
    restart: unless-stopped
    ports:
      - "8788:8788"
    env_file:
      - .env
    environment:
      # Single-port deployment: the app is served from the same origin as the API.
      AGENT_PORT: "8788"
      APP_URL: "http://localhost:8788"
    volumes:
      - nimbus-data:/app/server/.data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8788/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  nimbus-data:
